services:
  - type: web
    name: formix-firme-concreto
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: formix-firme-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: SESSION_COOKIE_SECURE
        value: 1
      - key: APP_SECRET_KEY
        value: Formix#2026!SecretKey
      - key: APP_TIMEZONE
        value: America/Cancun
      - key: TZ
        value: America/Cancun

databases:
  - name: formix-firme-db
    plan: free
