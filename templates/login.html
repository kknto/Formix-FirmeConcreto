<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceso - FIRME CONCRETOS</title>
  <link rel="icon" type="image/jpeg"
    href="{{ url_for('static', filename='img/logo_firme_concreto.jpeg', v=cache_bust) }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css', v=cache_bust) }}">
</head>

<body>
  <main class="auth-layout">
    <section class="auth-card">
      <div class="auth-header">
        <img class="auth-logo" src="{{ url_for('static', filename='img/logo_firme_concreto.jpeg', v=cache_bust) }}"
          alt="FIRME CONCRETOS">
        <div class="auth-brand">
          <h1 style="display: flex; align-items: center;">FIRME CONCRETOS</h1>
          <p>Gestión operativa de mezclas de concreto</p>
        </div>
      </div>
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}
      <form method="post" action="{{ url_for('login_submit') }}" class="auth-form" autocomplete="off">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
        <label>Usuario
          <input type="text" name="username" maxlength="64" required autofocus>
        </label>
        <label>Contraseña
          <input type="password" name="password" maxlength="128" required>
        </label>
        <button type="submit" class="btn btn--primary">Ingresar</button>
      </form>

    </section>
  </main>
</body>

</html>
